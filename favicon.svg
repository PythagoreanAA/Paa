<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="PAA favicon emblem">
  <defs>
    <!-- Deep interior -->
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#062a78"/>
      <stop offset="55%" stop-color="#03185a"/>
      <stop offset="100%" stop-color="#01081f"/>
    </radialGradient>

    <!-- Tyrian purple ring -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b44cff"/>
      <stop offset="38%" stop-color="#7b22c4"/>
      <stop offset="72%" stop-color="#53179a"/>
      <stop offset="100%" stop-color="#35106f"/>
    </linearGradient>

    <!-- Node fill -->
    <radialGradient id="nodeGrad" cx="35%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#dbffff"/>
      <stop offset="38%" stop-color="#7cf6f7"/>
      <stop offset="100%" stop-color="#09d9d3"/>
    </radialGradient>

    <!-- Apex fill -->
    <radialGradient id="apexGrad" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#dfffff"/>
      <stop offset="100%" stop-color="#2af0ea"/>
    </radialGradient>

    <!-- Gold line gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5bf"/>
      <stop offset="45%" stop-color="#f4d36b"/>
      <stop offset="100%" stop-color="#c08d2f"/>
    </linearGradient>

    <!-- Soft aqua glow -->
    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.6" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="
          0 0 0 0 0.00
          0 0 0 0 0.95
          0 0 0 0 0.95
          0 0 0 .65 0"
        result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger apex glow -->
    <filter id="apexGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6.5" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="
          0 0 0 0 0.00
          0 0 0 0 1.00
          0 0 0 0 1.00
          0 0 0 .9 0"
        result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000000" flood-opacity=".42"/>
    </filter>
  </defs>

  <!-- Outer seal -->
  <g filter="url(#shadow)">
    <circle cx="128" cy="128" r="112" fill="url(#bgGrad)" stroke="url(#ringGrad)" stroke-width="18"/>
    <circle cx="128" cy="128" r="95" fill="none" stroke="#f1dd7a" stroke-width="2.2"/>
  </g>

  <!-- Apex starburst -->
  <g opacity=".75" stroke="#42fff7" stroke-linecap="round">
    <line x1="128" y1="70" x2="128" y2="44" stroke-width="1.6"/>
    <line x1="128" y1="70" x2="146" y2="51" stroke-width="1.2"/>
    <line x1="128" y1="70" x2="154" y2="70" stroke-width="1.1"/>
    <line x1="128" y1="70" x2="146" y2="89" stroke-width="1.2"/>
    <line x1="128" y1="70" x2="128" y2="96" stroke-width="1.0"/>
    <line x1="128" y1="70" x2="110" y2="89" stroke-width="1.2"/>
    <line x1="128" y1="70" x2="102" y2="70" stroke-width="1.1"/>
    <line x1="128" y1="70" x2="110" y2="51" stroke-width="1.2"/>

    <line x1="128" y1="70" x2="152" y2="58" stroke-width=".9" opacity=".55"/>
    <line x1="128" y1="70" x2="152" y2="82" stroke-width=".9" opacity=".55"/>
    <line x1="128" y1="70" x2="104" y2="58" stroke-width=".9" opacity=".55"/>
    <line x1="128" y1="70" x2="104" y2="82" stroke-width=".9" opacity=".55"/>
  </g>

  <!-- Lattice -->
  <g stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".96">
    <!-- horizontals -->
    <line x1="108" y1="105" x2="148" y2="105"/>
    <line x1="88" y1="140" x2="168" y2="140"/>
    <line x1="68" y1="175" x2="188" y2="175"/>

    <!-- outer diagonals -->
    <line x1="128" y1="70" x2="108" y2="105"/>
    <line x1="128" y1="70" x2="148" y2="105"/>

    <line x1="108" y1="105" x2="88" y2="140"/>
    <line x1="148" y1="105" x2="168" y2="140"/>

    <line x1="88" y1="140" x2="68" y2="175"/>
    <line x1="168" y1="140" x2="188" y2="175"/>

    <!-- inner diagonals -->
    <line x1="108" y1="105" x2="128" y2="140"/>
    <line x1="148" y1="105" x2="128" y2="140"/>

    <line x1="88" y1="140" x2="108" y2="175"/>
    <line x1="128" y1="140" x2="108" y2="175"/>

    <line x1="128" y1="140" x2="148" y2="175"/>
    <line x1="168" y1="140" x2="148" y2="175"/>
  </g>

  <!-- Nodes -->
  <g>
    <!-- glow halos -->
    <g filter="url(#nodeGlow)" opacity=".95">
      <circle cx="108" cy="105" r="13.5" fill="#1ff0e9"/>
      <circle cx="148" cy="105" r="13.5" fill="#1ff0e9"/>

      <circle cx="88" cy="140" r="13.5" fill="#1ff0e9"/>
      <circle cx="128" cy="140" r="13.5" fill="#1ff0e9"/>
      <circle cx="168" cy="140" r="13.5" fill="#1ff0e9"/>

      <circle cx="68" cy="175" r="13.5" fill="#1ff0e9"/>
      <circle cx="108" cy="175" r="13.5" fill="#1ff0e9"/>
      <circle cx="148" cy="175" r="13.5" fill="#1ff0e9"/>
      <circle cx="188" cy="175" r="13.5" fill="#1ff0e9"/>
    </g>

    <!-- apex aura -->
    <g filter="url(#apexGlow)">
      <circle cx="128" cy="70" r="14" fill="#54fff9" opacity=".95"/>
    </g>

    <!-- actual nodes -->
    <circle cx="128" cy="70" r="12.5" fill="url(#apexGrad)" stroke="#fff4be" stroke-width="1.4"/>

    <circle cx="108" cy="105" r="12.8" fill="url(#nodeGrad)" stroke="#fff0b0" stroke-width="1.25"/>
    <circle cx="148" cy="105" r="12.8" fill="url(#nodeGrad)" stroke="#fff0b0" stroke-width="1.25"/>

    <circle cx="88" cy="140" r="12.8" fill="url(#nodeGrad)" stroke="#fff0b0" stroke-width="1.25"/>
    <circle cx="128" cy="140" r="12.8" fill="url(#nodeGrad)" stroke="#fff0b0" stroke-width="1.25"/>
    <circle cx="168" cy="140" r="12.8" fill="url(#nodeGrad)" stroke="#fff0b0" stroke-width="1.25"/>

    <circle cx="68" cy="175" r="12.8" fill="url(#nodeGrad)" stroke="#fff0b0" stroke-width="1.25"/>
    <circle cx="108" cy="175" r="12.8" fill="url(#nodeGrad)" stroke="#fff0b0" stroke-width="1.25"/>
    <circle cx="148" cy="175" r="12.8" fill="url(#nodeGrad)" stroke="#fff0b0" stroke-width="1.25"/>
    <circle cx="188" cy="175" r="12.8" fill="url(#nodeGrad)" stroke="#fff0b0" stroke-width="1.25"/>
  </g>
</svg>
