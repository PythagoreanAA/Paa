  <style>
    :root{
      --bg:#060814;
      --bg-soft:#0b1222;
      --panel:rgba(13,18,34,0.68);
      --panel-2:rgba(255,255,255,0.04);
      --line:rgba(255,255,255,0.10);
      --line-strong:rgba(110,247,238,0.25);
      --text:#edf3ff;
      --muted:#aab6d3;
      --muted-2:#8390b0;
      --gold:#c7a96a;
      --teal:#36d3c8;
      --teal-2:#7cf6ed;
      --purple:#2a0b3d;
      --shadow:0 24px 80px rgba(0,0,0,0.45);
      --radius:24px;
      --radius-sm:16px;
      --max:1200px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1000px 700px at 12% 0%, rgba(42,11,61,0.45), transparent 55%),
        radial-gradient(800px 600px at 100% 15%, rgba(54,211,200,0.14), transparent 50%),
        radial-gradient(1000px 700px at 50% 100%, rgba(199,169,106,0.08), transparent 50%),
        linear-gradient(180deg, #050711 0%, #090d1b 40%, #070a14 100%);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size:42px 42px;
      mask-image:radial-gradient(circle at 50% 30%, black 25%, transparent 90%);
      opacity:.35;
    }

    a{color:inherit}
    img{max-width:100%;display:block}

    .container{
      width:min(var(--max), calc(100% - 32px));
      margin:0 auto;
    }

    .site-header{
      position:sticky;
      top:0;
      z-index:40;
      backdrop-filter:blur(16px);
      background:linear-gradient(180deg, rgba(6,8,20,0.88), rgba(6,8,20,0.55));
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      min-height:76px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      text-decoration:none;
      min-width:0;
    }
