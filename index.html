<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAA Birth Root Glyph</title>

<style>
body {
  margin:0;
  font-family: system-ui, sans-serif;
  background:#0a0f1f;
  color:#e9ecf8;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:24px;
}

h1,h2,h3 {
  margin:0 0 12px;
}

.card {
  background:#121933;
  border:1px solid #2a355e;
  border-radius:16px;
  padding:20px;
  margin-top:20px;
}

input {
  padding:12px;
  border-radius:10px;
  border:1px solid #2a355e;
  background:#0f1530;
  color:white;
}

button {
  padding:12px 18px;
  margin-top:12px;
  border:none;
  border-radius:999px;
  background:#5ce3dc;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

.section {
  margin-top:18px;
}

.label {
  font-weight:bold;
  color:#9fb3ff;
}

.small {
  color:#9aa3c9;
}

</style>
</head>

<body>

<div class="container">

<h1>PAA Birth Root Glyph</h1>
<p class="small">Enter birthdate → reveal structural pattern.</p>

<div class="card">
  <input type="date" id="birthdate">
  <br>
  <button onclick="calculate()">Reveal Glyph</button>
</div>

<div id="result" class="card" style="display:none;">

<h2 id="glyphTitle"></h2>

<div class="section">
<div class="label">Calculation Spine</div>
<p id="calc"></p>
</div>

<div class="section">
<div class="label">Archetype</div>
<p id="archetype"></p>
</div>

<div class="section">
<div class="label">Virtue</div>
<p id="virtue"></p>
</div>

<div class="section">
<div class="label">Vice</div>
<p id="vice"></p>
</div>

<div class="section">
<div class="label">EIEIA</div>
<p id="eieia"></p>
</div>

<div class="section">
<div class="label">Coherent Expression</div>
<p id="coherent"></p>
</div>

<div class="section">
<div class="label">Distortion Trigger</div>
<p id="trigger"></p>
</div>

<div class="section">
<div class="label">Distorted Expression</div>
<p id="distorted"></p>
</div>

<div class="section">
<div class="label">Regulation Mechanics</div>
<p id="regulation"></p>
</div>

</div>

</div>

<script>

const data = {
1:{
title:"1 — The Initiator",
archetype:"Originating force. Asserts direction.",
virtue:"Will, independence, initiation",
vice:"Domination, isolation",
eieia:"Essence: singular\nImpulse: initiate\nEnergy: direct\nIntelligence: agency-based\nAction: leader",
coherent:"Leads decisively without tyranny",
trigger:"Loss of control or autonomy",
distorted:"Over-dominates, isolates",
regulation:"Constraint: structure\nFeedback: others resist\nCost: loss of trust"
},
2:{
title:"2 — The Mirror",
archetype:"Relational field. Reflects.",
virtue:"Harmony, empathy",
vice:"Dependency, passivity",
eieia:"Essence: relational\nImpulse: connect\nEnergy: responsive\nIntelligence: emotional\nAction: mediator",
coherent:"Balances without losing self",
trigger:"Fear of abandonment",
distorted:"Fawns, dissolves identity",
regulation:"Constraint: boundaries\nFeedback: relational tension\nCost: loss of self"
},
3:{
title:"3 — The Triad",
archetype:"Expression and synthesis",
virtue:"Creativity, communication",
vice:"Performance, superficiality",
eieia:"Essence: expressive\nImpulse: communicate\nEnergy: expansive\nIntelligence: narrative\nAction: artist",
coherent:"Authentic expression",
trigger:"Need for validation",
distorted:"Performs, masks truth",
regulation:"Constraint: discipline\nFeedback: rejection\nCost: loss of authenticity"
},
4:{
title:"4 — The Builder",
archetype:"Structure and order",
virtue:"Discipline, stability",
vice:"Rigidity, control",
eieia:"Essence: structural\nImpulse: build\nEnergy: steady\nIntelligence: systems\nAction: organizer",
coherent:"Builds durable systems",
trigger:"Chaos or uncertainty",
distorted:"Over-controls, stagnates",
regulation:"Constraint: flexibility\nFeedback: system failure\nCost: stagnation"
},
5:{
title:"5 — The Adventurer",
archetype:"Movement and change",
virtue:"Adaptability, freedom",
vice:"Impulsiveness, chaos",
eieia:"Essence: mobile\nImpulse: explore\nEnergy: fast\nIntelligence: opportunity\nAction: disruptor",
coherent:"Explores with direction",
trigger:"Excess novelty",
distorted:"Scatters, escapes",
regulation:"Constraint: rhythm\nFeedback: consequences\nCost: instability"
},
6:{
title:"6 — The Nurturer",
archetype:"Harmony and care",
virtue:"Responsibility, love",
vice:"Martyrdom, control",
eieia:"Essence: nurturing\nImpulse: care\nEnergy: cohesive\nIntelligence: relational\nAction: caretaker",
coherent:"Supports without control",
trigger:"Need for perfection",
distorted:"Smothers, resents",
regulation:"Constraint: boundaries\nFeedback: burnout\nCost: exhaustion"
},
7:{
title:"7 — The Seeker",
archetype:"Inner inquiry",
virtue:"Wisdom, depth",
vice:"Isolation, cynicism",
eieia:"Essence: inward\nImpulse: understand\nEnergy: withdrawing\nIntelligence: abstract\nAction: analyst",
coherent:"Refined insight",
trigger:"Excess isolation",
distorted:"Detaches from reality",
regulation:"Constraint: embodiment\nFeedback: social friction\nCost: disconnection"
},
8:{
title:"8 — The Ruler",
archetype:"Power and execution",
virtue:"Mastery, authority",
vice:"Domination, greed",
eieia:"Essence: power\nImpulse: control\nEnergy: forceful\nIntelligence: strategic\nAction: executive",
coherent:"Leads with discipline",
trigger:"Fear of weakness",
distorted:"Dominates others",
regulation:"Constraint: ethics\nFeedback: resistance\nCost: collapse"
},
9:{
title:"9 — The Completion",
archetype:"Closure and transcendence",
virtue:"Compassion, wisdom",
vice:"Self-erasure, escapism",
eieia:"Essence: completion\nImpulse: release\nEnergy: dissolving\nIntelligence: holistic\nAction: humanitarian",
coherent:"Completes cycles wisely",
trigger:"Overwhelm",
distorted:"Escapes or self-sacrifices",
regulation:"Constraint: grounding\nFeedback: reality demand\nCost: loss of self"
}
};

function calculate(){
const input = document.getElementById("birthdate").value;
if(!input){ alert("Enter birthdate"); return; }

const digits = input.replaceAll("-","").split("").map(Number);
let sum = digits.reduce((a,b)=>a+b,0);

let root = sum;
while(root>9){ root = String(root).split("").reduce((a,b)=>a+Number(b),0); }

const g = data[root];

document.getElementById("glyphTitle").innerText = g.title;
document.getElementById("calc").innerText =
`${digits.join(" + ")} = ${sum} → ${root}`;

document.getElementById("archetype").innerText = g.archetype;
document.getElementById("virtue").innerText = g.virtue;
document.getElementById("vice").innerText = g.vice;
document.getElementById("eieia").innerText = g.eieia;
document.getElementById("coherent").innerText = g.coherent;
document.getElementById("trigger").innerText = g.trigger;
document.getElementById("distorted").innerText = g.distorted;
document.getElementById("regulation").innerText = g.regulation;

document.getElementById("result").style.display="block";
}

</script>

</body>
</html>
