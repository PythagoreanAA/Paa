<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Transmission Received | PAA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    :root{
      --bg:#040612;
      --ink:#edf7ff;
      --muted:#9eb4c2;
      --aqua:#8df8ff;
      --violetBright:#b958df;
      --line:rgba(141,248,255,.12);
      --radius:28px;
      --shadow:0 30px 80px rgba(0,0,0,.45);
      --serif:'Cormorant Garamond', serif;
      --sans:'Inter', sans-serif;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:32px;
      color:var(--ink);
      font-family:var(--sans);

      background:
        radial-gradient(circle at top, rgba(124,42,145,.46), transparent 28rem),
        radial-gradient(circle at 18% 22%, rgba(49,223,209,.12), transparent 24rem),
        linear-gradient(180deg, #030711 0%, #08111f 48%, #040612 100%);
    }

    .panel{
      width:min(760px,100%);
      padding:56px;
      border-radius:var(--radius);

      background:
        linear-gradient(
          180deg,
          rgba(16,25,45,.92),
          rgba(6,10,20,.98)
        );

      border:1px solid var(--line);
      box-shadow:var(--shadow);
      text-align:center;
    }

    .eyebrow{
      color:var(--aqua);
      text-transform:uppercase;
      letter-spacing:.24em;
      font-size:12px;
      margin-bottom:22px;
    }

    h1{
      margin:0;
      font-family:var(--serif);
      font-weight:400;
      font-size:clamp(46px,7vw,88px);
      line-height:.95;
      letter-spacing:.06em;
      text-transform:uppercase;

      background:
        linear-gradient(
          180deg,
          #ffffff 0%,
          var(--aqua) 58%,
          #bfefff 100%
        );

      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    p{
      margin:30px auto 0;
      max-width:620px;
      color:var(--muted);
      line-height:1.9;
      font-size:20px;
    }

    .threshold{
      margin-top:34px;
      font-family:var(--serif);
      font-size:30px;
      font-style:italic;
      color:#dcefff;
    }

    .button{
      display:inline-block;
      margin-top:40px;
      padding:16px 24px;
      border-radius:18px;

      background:
        linear-gradient(
          135deg,
          var(--violetBright),
          var(--aqua)
        );

      color:#041018;
      text-decoration:none;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;

      transition:
        transform .2s ease,
        box-shadow .2s ease;

      box-shadow:
        0 14px 40px rgba(49,223,209,.18);
    }

    .button:hover{
      transform:translateY(-2px);
    }

    @media(max-width:760px){

      .panel{
        padding:36px 26px;
      }

      p{
        font-size:18px;
      }

    }

  </style>
</head>

<body>

  <div class="panel">

    <div class="eyebrow">
      Correspondence Received
    </div>

    <h1>
      Transmission<br>
      Accepted
    </h1>

    <p>
      Your message has entered the field and will be received in due course.
      What is spoken with clarity carries further than what is spoken with urgency.
    </p>

    <div class="threshold">
      Recognition precedes refinement.
    </div>

    <a class="button" href="index.html">
      Return Home
    </a>

  </div>

</body>
</html>
